# `auto` lets mattergen.common.utils.distributed.setup_ddp pick the best
# backend for the current host (NCCL on CUDA, XCCL on Intel XPU, Gloo on CPU).
# Override with `distributed_backend=nccl|gloo|xccl|mpi` to pin a choice.
distributed_backend: auto
find_unused_parameters: true
set_property_scalers: true
sync_batch_norm: false
static_graph: false
gradient_as_bucket_view: true
use_amp: false
amp_dtype: float16
log_every_n_steps: 50
