hydra:
  run:
    dir: ${oc.env:OUTPUT_DIR,outputs/singlerun/${now:%Y-%m-%d}/${now:%H-%M-%S}}


auto_resume: true
trainer_backend: native_ddp

defaults:
  - data_module: mp_20
  - trainer: default
  - native_trainer: default
  - model_module: default
  - model_module/diffusion_module: csp
  - model_module/diffusion_module/model: mattergen
  - model_module/diffusion_module/corruption: csp
