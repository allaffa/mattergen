hydra:
  run:
    dir: ${oc.env:OUTPUT_DIR,outputs/singlerun/${now:%Y-%m-%d}/${now:%H-%M-%S}}

trainer_backend: native_ddp

lightning_module: ${model_module}

defaults:
  - data_module: mp_20
  - trainer: default
  - native_trainer: default
  - model_module: default
  - adapter: default

trainer:
  max_epochs: 200
  logger:
    job_type: train_finetune # override default defined in defaults.trainer yaml file

model_module:
  optimizer_partial:
    lr: 5e-6
