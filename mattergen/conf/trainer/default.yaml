accelerator: 'gpu'
devices: 8
num_nodes: 2
precision: 32
max_epochs: ${data_module.max_epochs}
accumulate_grad_batches: 1
gradient_clip_val: 0.5
gradient_clip_algorithm: value
check_val_every_n_epoch: 1
strategy: auto
  
logger:
  type: wandb
  project: crystal-generation
  job_type: train

checkpoint:
  monitor: loss_val
  mode: min
  save_top_k: 1
  save_last: True
  every_n_epochs: 1
  filename: "{epoch}-{loss_val:.2f}"
